<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFFAF5">
  <meta name="description" content="猫咪助手 - 科学喂养、健康管理、成长记录">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="猫咪助手">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
  <title>猫咪助手</title>

  <!-- Supabase CDN: synchronous (must load before all defer scripts) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- All app scripts: defer ensures they run after body is parsed -->
  <script defer src="js/utils.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/tasks.js"></script>
  <script defer src="js/ai.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="js/actions.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data>

  <!-- ===== Loading Overlay ===== -->
  <div class="loading-overlay" x-show="$store.app && $store.app.loading">
    <div class="spinner"></div>
    <p style="color:var(--color-text-light);font-size:14px;">加载中...</p>
  </div>

  <!-- ===== Welcome Overlay (first-time users) ===== -->
  <div class="welcome-overlay" x-show="$store.ui && $store.ui.showWelcome">
    <div class="welcome-card">
      <h1 class="welcome-title">🐱 欢迎使用猫咪助手</h1>
      <p class="welcome-subtitle">请填写猫咪信息，开始科学养育之旅</p>
      <form @submit.prevent="
        Actions.createCat({
          name: $el.name.value,
          birthday: $el.birthday.value,
          breed: $el.breed.value,
          gender: $el.gender.value,
          weight_history: [{ date: new Date().toLocaleDateString('en-CA'), weight_g: parseInt($el.weight.value) || 0 }]
        });
      ">
        <div class="form-group">
          <label class="form-label">猫咪名字 *</label>
          <input class="form-input" type="text" name="name" required placeholder="给猫咪取个名字" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label">生日 *</label>
          <input class="form-input" type="date" name="birthday" required>
        </div>
        <div class="form-group">
          <label class="form-label">品种</label>
          <select class="form-select" name="breed">
            <option value="中华田园猫">中华田园猫</option>
            <option value="橘猫">橘猫</option>
            <option value="狸花猫">狸花猫</option>
            <option value="三花猫">三花猫</option>
            <option value="奶牛猫">奶牛猫</option>
            <option value="英短">英短</option>
            <option value="美短">美短</option>
            <option value="布偶">布偶</option>
            <option value="缅因">缅因</option>
            <option value="暹罗">暹罗</option>
            <option value="波斯">波斯</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">性别 *</label>
          <div style="display:flex;gap:12px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="radio" name="gender" value="公" required> 公 ♂
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="radio" name="gender" value="母" required> 母 ♀
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">体重（克）</label>
          <input class="form-input" type="number" name="weight" placeholder="例如：300" min="50" max="15000">
        </div>
        <button class="btn btn-primary" type="submit">创建猫咪档案</button>
      </form>
    </div>
  </div>

  <!-- ===== Not Found State ===== -->
  <div class="error-state" x-show="$store.ui && $store.ui.notFound">
    <p style="font-size:48px;">😿</p>
    <p style="font-size:18px;font-weight:600;margin-top:16px;">未找到猫咪</p>
    <p style="color:var(--color-text-light);font-size:14px;margin-top:8px;">
      分享码: <span x-text="$store.ui.notFound" style="font-weight:600;"></span>
    </p>
    <p style="color:var(--color-text-muted);font-size:13px;margin-top:4px;">请检查链接是否正确，或重新创建猫咪档案</p>
    <button class="btn btn-primary mt-16" @click="window.location.href = window.location.pathname">返回首页</button>
  </div>

  <!-- ===== Main Content (shown when loaded and cat exists) ===== -->
  <div x-show="!$store.app.loading && $store.app.cat && !$store.ui.notFound">

    <!-- ============================================================
         TAB 1: 🏠 首页 (home)
         ============================================================ -->
    <section class="tab-content page" x-show="$store.app.currentTab === 'home'" x-transition>
      <template x-if="$store.app.cat">
      <div>

      <!-- Hero Cat Card -->
      <div class="card cat-card" x-show="$store.app.cat">
        <div class="cat-avatar">🐱</div>
        <div class="cat-name" x-text="$store.app.cat.name"></div>
        <div class="cat-meta">
          <span x-text="$store.app.cat.breed"></span>
          <span>·</span>
          <span x-text="$store.app.cat.gender"></span>
        </div>
        <div class="cat-meta" x-show="$store.app.cat.weight_history && $store.app.cat.weight_history.length > 0">
          体重: <span x-text="($store.app.cat.weight_history && $store.app.cat.weight_history.length > 0) ? $store.app.cat.weight_history[$store.app.cat.weight_history.length - 1].weight_g + 'g' : ''"></span>
        </div>
        <div class="cat-age-badge" x-show="$store.app.age">
          <span x-text="($store.app.age ? $store.app.age.weeks : 0) + '周' + ($store.app.age && $store.app.age.days > 0 ? $store.app.age.days + '天' : '')"></span>
        </div>
      </div>

      <!-- Stage Alert -->
      <div class="stage-alert" x-show="$store.app.cat && $store.app.bundle">
        <span>⚠️</span>
        <span x-text="Actions.stageAlertText($store.app.age, $store.app.bundle)"></span>
      </div>

      <!-- Daily Tasks Section -->
      <div class="task-section-title" x-show="$store.tasks.daily.length > 0">
        🔄 每日必做
        <span class="badge badge-info" style="margin-left:6px;" x-text="$store.tasks.daily.length"></span>
      </div>
      <template x-for="task in $store.tasks.daily" :key="task.id">
        <div class="task-item daily"
          :class="{ done: task.status === 'done' }"
          @click="Actions.toggleTask(task.id)">
          <div class="task-checkbox" :class="{ checked: task.status === 'done' }"></div>
          <span class="task-icon" x-text="task.icon"></span>
          <div class="task-body" style="flex:1;">
            <span class="task-name" x-text="task.name"></span>
            <span class="task-desc text-small text-muted" x-show="task.status === 'done'">今日已完成 ✓</span>
          </div>
          <span class="task-time" x-show="task.time_of_day" x-text="task.time_of_day"></span>
        </div>
      </template>

      <!-- Schedule Tasks Section -->
      <div class="task-section-title" x-show="$store.tasks.schedule.length > 0">
        📅 待完成事项
        <span class="badge badge-warning" style="margin-left:6px;" x-text="$store.tasks.schedule.length"></span>
      </div>
      <template x-for="task in $store.tasks.schedule" :key="task.id">
        <div class="task-item schedule"
          :class="{ done: task.status === 'done' }"
          @click="Actions.toggleTask(task.id)">
          <div class="task-checkbox" :class="{ checked: task.status === 'done' }"></div>
          <span class="task-icon" x-text="task.icon"></span>
          <div class="task-body" style="flex:1;">
            <span class="task-name" x-text="task.name"></span>
            <span class="task-desc text-small text-muted" x-show="task.description" x-text="task.description"></span>
          </div>
        </div>
      </template>

      <!-- Periodic Tasks Section -->
      <div class="task-section-title" x-show="$store.tasks.periodic.length > 0">
        🔁 定期任务
        <span class="badge" style="margin-left:6px;background:#F3E5F5;color:#8E44AD;" x-text="$store.tasks.periodic.length"></span>
      </div>
      <template x-for="task in $store.tasks.periodic" :key="task.id">
        <div class="task-item periodic"
          :class="{ overdue: task.status === 'overdue' }"
          @click="Actions.toggleTask(task.id)">
          <div class="task-checkbox" :class="{ checked: task.status === 'done' }"></div>
          <span class="task-icon" x-text="task.icon"></span>
          <div class="task-body" style="flex:1;">
            <span class="task-name" x-text="task.name"></span>
            <span class="task-desc text-small" x-show="task.status === 'overdue'" style="color:var(--color-danger);">已过期</span>
          </div>
          <span class="overdue-badge" x-show="task.status === 'overdue'">过期</span>
        </div>
      </template>

      <!-- Done Items Section -->
      <div class="task-section-title" x-show="$store.tasks.doneItems.length > 0">
        ✅ 已完成
      </div>
      <template x-for="task in $store.tasks.doneItems" :key="task.id">
        <div class="task-item done" @click="Actions.toggleTask(task.id)">
          <div class="task-checkbox checked"></div>
          <span class="task-icon" x-text="task.icon"></span>
          <div class="task-body" style="flex:1;">
            <span class="task-name" x-text="task.name"></span>
            <span class="task-desc text-small text-muted" x-text="task.description"></span>
          </div>
        </div>
      </template>

      <!-- Empty State -->
      <div class="empty-state" x-show="$store.tasks.daily.length === 0 && $store.tasks.schedule.length === 0 && $store.tasks.periodic.length === 0 && $store.tasks.doneItems.length === 0 && $store.app.cat">
        今天没有待办任务 🎉
      </div>
      </div>
      </template>

    </section>

    <!-- ============================================================
         TAB 2: 🍼 喂养 (feeding)
         ============================================================ -->
    <section class="tab-content page" x-show="$store.app.currentTab === 'feeding'" x-transition>
      <template x-if="$store.app.bundle">
      <div>
        <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">🍼 喂养指南</h2>
        <div class="card" x-show="$store.app.age">
          <div class="card-header">📋 当前喂养方案</div>
          <template x-for="s in $store.app.bundle.feeding.stages" :key="s.stage">
            <div x-show="$store.app.age.weeks >= s.age_weeks[0] && $store.app.age.weeks <= s.age_weeks[1]">
              <p style="font-weight:600;font-size:16px;" x-text="s.stage"></p>
              <p style="font-size:14px;">食物: <span x-text="s.food" style="color:var(--sunrise);"></span></p>
              <p style="font-size:14px;">每日餐次: <span x-text="s.meals_per_day + '顿'"></span></p>
              <p style="font-size:14px;">每日总量: <span x-text="s.amount_daily"></span></p>
              <p style="font-size:13px;color:var(--ink-secondary);line-height:1.6;" x-text="s.notes"></p>
            </div>
          </template>
        </div>
        <div class="card" x-show="$store.app.age.weeks >= 3 && $store.app.age.weeks <= 8">
          <div class="card-header">🍽️ 断奶过渡指南</div>
          <template x-for="step in $store.app.bundle.feeding.weaning_guide.steps" :key="step">
            <p style="font-size:14px;margin-bottom:6px;line-height:1.6;" x-text="step"></p>
          </template>
        </div>
        <div class="card">
          <div class="card-header">⛔ 禁食清单</div>
          <template x-for="item in $store.app.bundle.feeding.forbidden_foods" :key="item.food">
            <div style="padding:8px 0;border-bottom:1px solid var(--border);">
              <span style="font-weight:600;" x-text="item.food"></span>
              <span class="badge" style="margin-left:6px;" x-text="item.severity"></span>
              <p style="font-size:13px;color:var(--ink-secondary);margin-top:4px;" x-text="item.reason"></p>
            </div>
          </template>
        </div>
        <div class="card">
          <div class="card-header">💧 饮水指南</div>
          <p style="font-size:14px;">每日饮水量: <span style="font-weight:600;color:var(--sunrise);" x-text="$store.app.bundle.feeding.water_guide.daily_water_ml_per_kg + 'ml/kg'"></span></p>
        </div>
        <!-- 7-Day Food Transition (collapsible) -->
        <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['feeding-transition'] }" x-show="$store.app.bundle">
          <div class="collapsible-header" @click="Actions.toggleCollapsible('feeding-transition')">
            🔄 7天换粮法
          </div>
          <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['feeding-transition']">
            <p style="font-size:13px;color:var(--color-text-light);margin-bottom:8px;" x-text="$store.app.bundle.feeding.food_transition.title"></p>
            <template x-for="s in $store.app.bundle.feeding.food_transition.steps" :key="s.day">
              <div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;">
                <span style="font-weight:700;min-width:32px;" x-text="'第'+s.day+'天'"></span>
                <span style="flex:1;">旧粮 <b x-text="s.old_food_percent+'%'"></b> + 新粮 <b x-text="s.new_food_percent+'%'"></b></span>
                <span style="font-size:12px;color:var(--color-text-light);" x-text="s.note"></span>
              </div>
            </template>
            <p style="font-size:12px;color:var(--color-danger);margin-top:8px;padding:8px;background:var(--color-danger-light);border-radius:8px;" x-text="$store.app.bundle.feeding.food_transition.warning"></p>
          </div>
        </div>
        <!-- Brand Compare (collapsible) -->
        <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['feeding-brands'] }" x-show="$store.app.bundle">
          <div class="collapsible-header" @click="Actions.toggleCollapsible('feeding-brands')">
            🏷️ 品牌对比
          </div>
          <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['feeding-brands']">
            <p style="font-size:14px;font-weight:600;margin-bottom:8px;">🍼 奶粉替代品</p>
            <template x-for="b in $store.app.bundle.feeding.brand_compare.milk_replacers" :key="b.name">
              <div style="margin-bottom:12px;padding:10px;background:var(--color-cream);border-radius:8px;">
                <p style="font-weight:600;font-size:14px;" x-text="b.name"></p>
                <p style="font-size:13px;color:var(--color-success);" x-text="'✅ '+b.pros"></p>
                <p style="font-size:13px;color:var(--color-danger);" x-text="'⚠️ '+b.cons"></p>
                <p style="font-size:12px;color:var(--color-text-light);" x-text="b.suitable_for"></p>
              </div>
            </template>
            <p style="font-size:14px;font-weight:600;margin:12px 0 8px;">🥫 幼猫湿粮</p>
            <template x-for="b in $store.app.bundle.feeding.brand_compare.kitten_wet_food" :key="b.name">
              <div style="margin-bottom:12px;padding:10px;background:var(--color-cream);border-radius:8px;">
                <p style="font-weight:600;font-size:14px;" x-text="b.name"></p>
                <p style="font-size:13px;color:var(--color-success);" x-text="'✅ '+b.pros"></p>
                <p style="font-size:13px;color:var(--color-danger);" x-text="'⚠️ '+b.cons"></p>
                <p style="font-size:12px;color:var(--color-text-light);" x-text="b.suitable_for"></p>
              </div>
            </template>
          </div>
        </div>
        <!-- Feeding Calculator (collapsible) -->
        <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['feeding-calc'] }" x-show="$store.app.bundle">
          <div class="collapsible-header" @click="Actions.toggleCollapsible('feeding-calc')">
            🧮 喂食计算器
          </div>
          <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['feeding-calc']">
            <p style="font-size:13px;color:var(--color-text-light);margin-bottom:8px;" x-text="$store.app.bundle.feeding.feeding_calculator.description"></p>
            <p style="font-size:14px;font-weight:600;margin-bottom:8px;" x-text="$store.app.bundle.feeding.feeding_calculator.formula"></p>
            <template x-for="(coef, age) in $store.app.bundle.feeding.feeding_calculator.coefficients" :key="age">
              <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid var(--color-border);">
                <span x-text="age"></span>
                <span style="font-weight:600;" x-text="typeof coef === 'number' ? coef.toFixed(3) : coef"></span>
              </div>
            </template>
            <p style="font-size:12px;color:var(--color-text-light);margin-top:8px;" x-text="$store.app.bundle.feeding.feeding_calculator.wet_to_dry_ratio"></p>
            <p style="font-size:12px;color:var(--color-text-light);margin-top:4px;font-style:italic;" x-text="$store.app.bundle.feeding.feeding_calculator.example"></p>
          </div>
        </div>
      </div>
      </template>
    </section>

    <!-- ============================================================
         TAB 3: 🏥 健康 (health)
         ============================================================ -->
    <section class="tab-content page" x-show="$store.app.currentTab === 'health'" x-transition>
      <template x-if="$store.app.bundle">
      <div>

      <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">🏥 健康</h2>

      <!-- Weight Records -->
      <div class="card" x-show="$store.app.cat">
        <div class="card-header">⚖️ 体重记录</div>
        <div x-show="$store.app.cat.weight_history && $store.app.cat.weight_history.length > 0">
          <template x-for="(rec, idx) in ($store.app.cat.weight_history || []).slice().reverse().slice(0, 10)" :key="idx">
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--color-border);font-size:14px;">
              <span x-text="rec.date"></span>
              <span style="font-weight:600;" x-text="rec.weight_g + 'g'"></span>
            </div>
          </template>
        </div>
        <p class="text-muted text-small" x-show="!$store.app.cat.weight_history || $store.app.cat.weight_history.length === 0">暂无体重记录</p>
        <form class="mt-12" @submit.prevent="Actions.addWeightRecord($el); $el.querySelector('input').value = ''" style="display:flex;gap:8px;">
          <input class="form-input" type="number" placeholder="输入体重（克）" min="50" max="15000" style="flex:1;">
          <button class="btn btn-primary" type="submit" style="width:auto;padding:12px 20px;">记录</button>
        </form>
        <div class="mt-12" x-show="$store.app.bundle && $store.app.age">
          <p style="font-size:13px;font-weight:600;margin-bottom:4px;">参考标准（当前周龄）:</p>
          <template x-for="std in $store.app.bundle.health.weight_standards.filter(function(s){return s.age_weeks <= $store.app.age.weeks;}).slice(-1)" :key="std.age_weeks">
            <p style="font-size:13px;color:var(--color-text-light);" x-text="'正常范围: ' + std.min_weight_g + 'g - ' + std.max_weight_g + 'g (平均' + std.avg_weight_g + 'g). ' + (std.note || '')"></p>
          </template>
        </div>
      </div>

      <!-- Vaccination Timeline -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">💉 疫苗接种时间线</div>
        <template x-for="vax in $store.app.bundle.health.vaccination" :key="vax.age_weeks">
          <div class="timeline-item"
            :class="{
              done: $store.app.age && $store.app.age.weeks > vax.age_weeks,
              current: $store.app.age && $store.app.age.weeks === vax.age_weeks,
              future: $store.app.age && $store.app.age.weeks < vax.age_weeks
            }">
            <div>
              <span style="font-size:14px;font-weight:600;" x-text="vax.vaccine + ' - 第' + vax.dose_number"></span>
              <span style="font-size:12px;color:var(--color-text-light);margin-left:6px;" x-text="vax.age_weeks + '周龄'"></span>
              <div style="font-size:13px;color:var(--color-text-light);margin-top:4px;">
                预防: <span x-text="vax.protects_against.join('、')"></span>
              </div>
              <p style="font-size:12px;color:var(--color-text-muted);margin-top:4px;" x-text="vax.note"></p>
            </div>
          </div>
        </template>
      </div>

      <!-- Deworming Timeline -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">🪱 驱虫时间线</div>
        <template x-for="dw in $store.app.bundle.health.deworming" :key="dw.age_weeks">
          <div class="timeline-item"
            :class="{
              done: $store.app.age && $store.app.age.weeks > dw.age_weeks,
              current: $store.app.age && $store.app.age.weeks === dw.age_weeks,
              future: $store.app.age && $store.app.age.weeks < dw.age_weeks
            }">
            <div>
              <span style="font-size:14px;font-weight:600;" x-text="dw.type + ' - ' + dw.product_example"></span>
              <span style="font-size:12px;color:var(--color-text-light);margin-left:6px;" x-text="dw.age_weeks + '周龄'"></span>
              <div style="font-size:13px;color:var(--color-text-light);margin-top:4px;">
                频率: <span x-text="dw.frequency"></span>
              </div>
              <p style="font-size:12px;color:var(--color-text-muted);margin-top:4px;" x-text="dw.note"></p>
            </div>
          </div>
        </template>
      </div>

      <!-- Common Diseases (collapsible) -->

              <p style="font-weight:600;font-size:14px;" x-text="h.item"></p>
              <p style="font-size:13px;color:var(--color-danger);" x-text="'⚠️ '+h.risk"></p>
              <p style="font-size:13px;color:var(--color-success);" x-text="'✅ '+h.prevention"></p>
            </div>
          </template>
        </div>
      </div>

      <!-- Litter Types (collapsible - reference) -->
      <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['encyclopedia-litter'] }" x-show="$store.app.bundle">
        <div class="collapsible-header" @click="Actions.toggleCollapsible('encyclopedia-litter')">
          🧻 <span x-text="$store.app.bundle.encyclopedia.litter_types.title"></span>
        </div>
        <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['encyclopedia-litter']">
          <template x-for="lt in $store.app.bundle.encyclopedia.litter_types.items" :key="lt.type">
            <div style="margin-bottom:12px;padding:10px;background:var(--color-cream);border-radius:8px;">
              <p style="font-weight:600;font-size:14px;">
                <span x-text="lt.type"></span>
                <span class="badge badge-success" style="margin-left:6px;font-size:11px;" x-show="lt.suitable_for_kitten">幼猫适用</span>
              </p>
              <template x-for="pro in lt.pros" :key="pro">
                <p style="font-size:13px;color:var(--color-success);padding:1px 0;" x-text="'✅ '+pro"></p>
              </template>
              <template x-for="con in lt.cons" :key="con">
                <p style="font-size:13px;color:var(--color-danger);padding:1px 0;" x-text="'⚠️ '+con"></p>
              </template>
              <p style="font-size:12px;color:var(--color-text-light);margin-top:4px;" x-text="lt.notes"></p>
            </div>
          </template>
        </div>
      </div>

      <!-- Forbidden Foods Detail (collapsible - detailed version) -->
      <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['encyclopedia-foods'] }" x-show="$store.app.bundle">
        <div class="collapsible-header" @click="Actions.toggleCollapsible('encyclopedia-foods')">
          🚫 <span x-text="$store.app.bundle.encyclopedia.forbidden_foods.title"></span>
        </div>
        <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['encyclopedia-foods']">
          <template x-for="food in $store.app.bundle.encyclopedia.forbidden_foods.items" :key="food.food">
            <div style="margin-bottom:10px;padding:10px;background:var(--color-cream);border-radius:8px;">
              <p style="font-weight:600;font-size:14px;" x-text="food.food"></p>
              <p style="font-size:12px;color:var(--color-text-muted);" x-text="food.category"></p>
              <p style="font-size:13px;color:var(--color-danger);" x-text="'有毒成分: '+food.toxic_substance"></p>
              <p style="font-size:13px;" x-text="'症状: '+food.symptoms"></p>
              <span class="badge badge-danger" style="margin-top:4px;" x-text="food.severity"></span>
              <p style="font-size:13px;font-weight:600;color:var(--sunrise-deep);margin-top:4px;" x-text="'🚑 '+food.action_if_ingested"></p>
            </div>
          </template>
        </div>
      </div>

    </section>

    <!-- ============================================================
         TAB 6: ⚙️ 设置 (settings)
         ============================================================ -->
    <section class="tab-content page" x-show="$store.app.currentTab === 'settings'" x-transition>
      <template x-if="$store.app.cat">
      <div>

      <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">⚙️ 设置</h2>

      <!-- Cat Edit Form -->
      <div class="card" x-show="$store.app.cat">
        <div class="card-header">🐱 编辑猫咪信息</div>
        <form @submit.prevent="Actions.submitSettingsForm($el); alert('保存成功！')">
          <div class="form-group">
            <label class="form-label">名字</label>
            <input class="form-input" type="text" name="name" :value="$store.app.cat.name" maxlength="30">
          </div>
          <div class="form-group">
            <label class="form-label">生日</label>
            <input class="form-input" type="date" name="birthday" :value="$store.app.cat.birthday">
          </div>
          <div class="form-group">
            <label class="form-label">品种</label>
            <select class="form-select" name="breed" :value="$store.app.cat.breed">
              <option value="中华田园猫">中华田园猫</option>
              <option value="橘猫">橘猫</option>
              <option value="狸花猫">狸花猫</option>
              <option value="三花猫">三花猫</option>
              <option value="奶牛猫">奶牛猫</option>
              <option value="英短">英短</option>
              <option value="美短">美短</option>
              <option value="布偶">布偶</option>
              <option value="缅因">缅因</option>
              <option value="暹罗">暹罗</option>
              <option value="波斯">波斯</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">性别</label>
            <div style="display:flex;gap:12px;">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="radio" name="gender" value="公" :checked="$store.app.cat.gender === '公'"> 公 ♂
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="radio" name="gender" value="母" :checked="$store.app.cat.gender === '母'"> 母 ♀
              </label>
            </div>
          </div>
          <button class="btn btn-primary" type="submit">保存修改</button>
        </form>
      </div>

      <!-- Share Link -->
      <div class="card" x-show="$store.app.shareKey">
        <div class="card-header">🔗 分享链接</div>
        <p style="font-size:13px;color:var(--color-text-light);margin-bottom:8px;">将此链接分享给家人，他们可以一起管理猫咪</p>
        <div style="display:flex;gap:8px;">
          <input class="form-input" type="text" readonly :value="window.location.origin + window.location.pathname + '?cat=' + $store.app.shareKey" style="flex:1;font-size:13px;" id="share-link-input">
          <button class="btn btn-secondary" style="width:auto;padding:12px 16px;" @click="Actions.copyShareLink($el)">复制</button>
        </div>
      </div>

      <!-- AI Chat Section -->
      <div class="card" x-show="$store.app.cat && $store.app.bundle">
        <div class="card-header">🤖 AI 养猫顾问 (DeepSeek)</div>

        <!-- API Key Setup -->
        <div x-show="!$store.ui.chatApiKey" style="margin-bottom:12px;">
          <p style="font-size:13px;color:var(--color-text-light);margin-bottom:6px;">请先设置 DeepSeek API Key（<a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--color-orange);">获取API Key</a>）</p>
          <div style="display:flex;gap:8px;">
            <input class="form-input" type="password" placeholder="sk-..." x-model="$store.ui.chatApiKey" style="flex:1;font-size:13px;">
            <button class="btn btn-primary" style="width:auto;padding:10px 16px;font-size:13px;" @click="Actions.setChatApiKey($store.ui.chatApiKey)">保存</button>
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-container" x-show="$store.ui.chatApiKey">
          <div class="chat-messages" id="chat-messages-container">
            <template x-for="msg in $store.ui.chatMessages" :key="msg.id">
              <div class="chat-msg" :class="msg.role" x-text="msg.content"></div>
            </template>
            <div x-show="$store.ui.chatMessages.length === 0" style="font-size:13px;color:var(--color-text-muted);text-align:center;padding:20px;">
              向AI咨询猫咪养育问题
            </div>
            <div x-show="$store.ui.chatLoading" style="text-align:center;padding:8px;">
              <span style="font-size:13px;color:var(--color-text-light);">AI思考中...</span>
            </div>
          </div>
          <form class="chat-input-row" @submit.prevent="
            let q = $store.ui.chatInput.trim();
            if (q) { Actions.sendChatMessage(q); }
            setTimeout(() => { let el = document.getElementById('chat-messages-container'); if (el) el.scrollTop = el.scrollHeight; }, 100);
            }
          ">
            <input class="chat-input" type="text" placeholder="输入问题..." x-model="$store.ui.chatInput">
            <button class="chat-send" type="submit" :disabled="$store.ui.chatLoading">发送</button>
          </form>
        </div>
      </div>

      <!-- About Card -->
      <div class="card">
        <div class="card-header">ℹ️ 关于</div>
        <p style="font-size:14px;margin-bottom:4px;"><strong>猫咪助手</strong></p>
        <p style="font-size:13px;color:var(--color-text-light);margin-bottom:4px;">版本: 2.0 (Alpine.js)</p>
        <p style="font-size:13px;color:var(--color-text-light);margin-bottom:4px;">科学喂养，健康长大 🐱</p>
        <p style="font-size:12px;color:var(--color-text-muted);">
          数据来源: 兽医文献 + 资深繁育人经验<br>
          AI顾问: DeepSeek Chat API
        </p>
      </div>

      </template>
    </section>

    <!-- ============================================================
         TAB 6: 🆘 紧急 (emergency)
         ============================================================ -->
    <section class="tab-content page" x-show="$store.app.currentTab === 'emergency'" x-transition>
      <template x-if="$store.app.bundle">
      <div>

      <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">🆘 紧急情况</h2>

      <!-- Poison Helpline -->
      <div class="card" x-show="$store.app.bundle" style="background:var(--color-danger-light);border:2px solid var(--color-danger);">
        <div class="card-header" style="color:var(--color-danger);">📞 中毒求助热线</div>
        <p style="font-size:14px;margin-bottom:4px;" x-text="$store.app.bundle.emergency.poison_helpline.china"></p>
        <p style="font-size:12px;color:var(--color-text-light);margin-top:4px;" x-text="$store.app.bundle.emergency.poison_helpline.note"></p>
      </div>

      <!-- When to See Vet Immediately -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">🚨 需要立即就医的情况</div>
        <template x-for="item in $store.app.bundle.emergency.when_to_see_vet" :key="item.symptom">
          <div class="collapsible" :class="{ open: $store.ui.collapsibleState && $store.ui.collapsibleState['emergency-'+item.symptom] }">
            <div class="collapsible-header" @click="Actions.toggleCollapsible('emergency-'+item.symptom)" style="font-size:14px;">
              <span>
                <span class="badge badge-danger" style="margin-right:6px;" x-text="item.urgency"></span>
                <span x-text="item.symptom"></span>
              </span>
            </div>
            <div class="collapsible-body" x-show="$store.ui.collapsibleState && $store.ui.collapsibleState['emergency-'+item.symptom]">
              <p style="font-size:13px;margin-bottom:4px;"><strong>可能原因:</strong> <span x-text="item.possible_causes.join('、')"></span></p>
              <p style="font-size:13px;margin-bottom:4px;color:var(--color-orange-dark);"><strong>应该做什么:</strong> <span x-text="item.what_to_do"></span></p>
              <p style="font-size:13px;margin-bottom:4px;color:var(--color-danger);"><strong>不要做:</strong> <span x-text="item.what_not_to_do"></span></p>
              <p style="font-size:12px;color:var(--color-text-muted);"><strong>送医途中:</strong> <span x-text="item.while_transporting"></span></p>
            </div>
          </div>
        </template>
      </div>

      <!-- Stool Guide -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">💩 大便观察指南</div>
        <p style="font-size:14px;font-weight:600;margin-bottom:6px;color:var(--color-success);">正常:</p>
        <template x-for="(val, key) in $store.app.bundle.emergency.stool_guide.normal" :key="key">
          <p style="font-size:13px;color:var(--color-text-light);margin-bottom:3px;" x-text="key + ': ' + val"></p>
        </template>
        <p style="font-size:14px;font-weight:600;margin-top:12px;margin-bottom:6px;color:var(--color-danger);">异常（需关注）:</p>
        <template x-for="item in $store.app.bundle.emergency.stool_guide.abnormal" :key="item.type">
          <div style="padding:8px 0;border-bottom:1px solid var(--border);">
            <p style="font-weight:600;font-size:14px;" x-text="item.type"></p>
            <p style="font-size:13px;color:var(--ink-secondary);" x-text="item.meaning"></p>
            <span class="badge badge-danger" x-text="item.urgency"></span>
          </div>
        </template>
      </div>

      <!-- First Aid Steps -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">⛑️ 急救步骤</div>
        <template x-for="(fa, key) in $store.app.bundle.emergency.first_aid" :key="key">
          <div style="padding:10px 0;border-bottom:1px solid var(--color-border);">
            <p style="font-size:14px;font-weight:600;margin-bottom:6px;" x-text="fa.situation"></p>
            <template x-for="(step, idx) in fa.steps" :key="idx">
              <p style="font-size:13px;color:var(--color-text-light);margin-bottom:3px;" x-text="(idx+1)+'. ' + step"></p>
            </template>
            <p style="font-size:12px;color:var(--color-text-muted);margin-top:4px;" x-text="fa.when_to_stop"></p>
          </div>
        </template>
      </div>

      <!-- Emergency Kit Checklist -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">🧰 急救包清单</div>
        <template x-for="item in $store.app.bundle.emergency.emergency_kit.items" :key="item">
          <p style="font-size:13px;color:var(--color-text-light);margin-bottom:4px;" x-text="'☐ ' + item"></p>
        </template>
      </div>

      <!-- Vital Signs Reference -->
      <div class="card" x-show="$store.app.bundle">
        <div class="card-header">🩺 生命体征参考</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div style="padding:10px;background:var(--color-orange-light);border-radius:var(--radius-btn);">
            <p style="font-size:12px;color:var(--color-text-light);">体温</p>
            <p style="font-size:16px;font-weight:700;" x-text="$store.app.bundle.emergency.vital_signs.normal_temp"></p>
          </div>
          <div style="padding:10px;background:var(--color-orange-light);border-radius:var(--radius-btn);">
            <p style="font-size:12px;color:var(--color-text-light);">心率</p>
            <p style="font-size:16px;font-weight:700;" x-text="$store.app.bundle.emergency.vital_signs.normal_heart_rate"></p>
          </div>
          <div style="padding:10px;background:var(--color-orange-light);border-radius:var(--radius-btn);">
            <p style="font-size:12px;color:var(--color-text-light);">呼吸率</p>
            <p style="font-size:16px;font-weight:700;" x-text="$store.app.bundle.emergency.vital_signs.normal_respiratory_rate"></p>
          </div>
        </div>
        <p style="font-size:13px;font-weight:600;margin-bottom:4px;">如何检查:</p>
        <template x-for="item in $store.app.bundle.emergency.vital_signs.how_to_check" :key="item">
          <p style="font-size:13px;color:var(--color-text-light);margin-bottom:3px;" x-text="'• ' + item"></p>
        </template>
        <p style="font-size:13px;font-weight:600;margin-top:12px;margin-bottom:4px;color:var(--color-danger);">异常信号:</p>
        <template x-for="item in $store.app.bundle.emergency.vital_signs.abnormal_signs" :key="item">
          <p style="font-size:13px;color:var(--color-text-light);margin-bottom:3px;" x-text="'• ' + item"></p>
        </template>
      </div>

      </template>
    </section>

  </div><!-- /main content wrapper -->
  <!-- ===== Bottom Navigation ===== -->
  <nav class="tab-bar" x-show="!$store.app.loading && $store.app.cat && !$store.ui.notFound">
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'home' }" @click="Actions.switchTab('home')">
      <span class="tab-icon">🏠</span>
      <span>首页</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'feeding' }" @click="Actions.switchTab('feeding')">
      <span class="tab-icon">🍼</span>
      <span>喂养</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'health' }" @click="Actions.switchTab('health')">
      <span class="tab-icon">🏥</span>
      <span>健康</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'growth' }" @click="Actions.switchTab('growth')">
      <span class="tab-icon">📚</span>
      <span>成长</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'encyclopedia' }" @click="Actions.switchTab('encyclopedia')">
      <span class="tab-icon">📖</span>
      <span>百科</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'settings' }" @click="Actions.switchTab('settings')">
      <span class="tab-icon">⚙️</span>
      <span>设置</span>
    </button>
    <button class="tab-btn" :class="{ active: $store.app.currentTab === 'emergency' }" @click="Actions.switchTab('emergency')">
      <span class="tab-icon">🆘</span>
      <span>紧急</span>
    </button>
  </nav>


</body>
</html>
