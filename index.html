<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#fff8f0">
  <meta name="description" content="小猫养育助手 - 科学喂养、健康管理、成长记录">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="猫咪助手">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
  <title>猫咪助手 - 小猫养育PWA</title>
</head>
<body>

  <!-- ===== Emergency Header Bar (fixed top) ===== -->
  <header id="emergency-header" class="emergency-header">
    <a href="#tab-emergency" class="emergency-link">🚨 紧急情况？点此查看判断指南</a>
  </header>

  <!-- ===== Main Content Area ===== -->
  <main id="main-content">

    <!-- Home tab (visible by default) -->
    <section id="tab-home" class="tab-content" style="display: block;">
      <div class="home-welcome">
        <h1>🐱 小猫养育助手</h1>
        <p class="home-subtitle">科学喂养，健康长大</p>
        <div class="home-placeholder">加载中...</div>
      </div>
    </section>

    <!-- Feeding tab -->
    <section id="tab-feeding" class="tab-content" style="display: none;">
      <h2>🍼 喂养</h2>
      <div class="tab-placeholder">加载中...</div>
    </section>

    <!-- Health tab -->
    <section id="tab-health" class="tab-content" style="display: none;">
      <h2>🏥 健康</h2>
      <div class="tab-placeholder">加载中...</div>
    </section>

    <!-- Growth tab -->
    <section id="tab-growth" class="tab-content" style="display: none;">
      <h2>📚 成长</h2>
      <div class="tab-placeholder">加载中...</div>
    </section>

    <!-- Settings tab -->
    <section id="tab-settings" class="tab-content" style="display: none;">
      <h2>⚙️ 设置</h2>
      <div class="tab-placeholder">加载中...</div>
    </section>

    <!-- Emergency content (accessible via header link, hidden by default) -->
    <section id="tab-emergency" class="tab-content" style="display: none;">
      <h2>🚨 紧急情况判断</h2>
      <div id="emergency-content" class="tab-placeholder">加载中...</div>
    </section>

  </main>

  <!-- ===== Bottom Tab Bar (fixed) ===== -->
  <nav id="bottom-nav" class="tab-bar">
    <button class="tab-btn active" data-tab="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </button>
    <button class="tab-btn" data-tab="feeding">
      <span class="tab-icon">🍼</span>
      <span class="tab-label">喂养</span>
    </button>
    <button class="tab-btn" data-tab="health">
      <span class="tab-icon">🏥</span>
      <span class="tab-label">健康</span>
    </button>
    <button class="tab-btn" data-tab="growth">
      <span class="tab-icon">📚</span>
      <span class="tab-label">成长</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">设置</span>
    </button>
  </nav>

  <!-- ===== Emergency Modal Overlay (hidden by default) ===== -->
  <div id="emergency-modal" class="emergency-modal" style="display: none;" aria-hidden="true">
    <div class="modal-container">
      <button id="emergency-modal-close" class="emergency-close" aria-label="关闭">&times;</button>
      <div id="emergency-modal-content" class="modal-body">
        <h2>🚨 紧急情况判断指南</h2>
        <div id="emergency-guide">加载中...</div>
      </div>
    </div>
  </div>

  <!-- ===== Loading Overlay ===== -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">加载中...</p>
  </div>

  <!-- ===== Supabase SDK ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- ===== JavaScript Modules (load order matters) ===== -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <!-- ===== Service Worker Registration ===== -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function (registration) {
          console.log('Service Worker registered with scope:', registration.scope);
        })
        .catch(function (error) {
          console.log('Service Worker registration failed:', error);
        });
    }
  </script>

</body>
</html>
